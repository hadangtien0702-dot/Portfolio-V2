<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio V2 | Modern Design</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="description" content="My Personal Portfolio - A modern and sophisticated website design." />
  </head>
  <body>
    <!-- Interactive grid background -->
    <div class="grid-bg" id="grid-bg"></div>

    <!-- Custom cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- Back to top -->
    <button id="back-to-top" aria-label="Back to top">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <div id="header-root"></div>
    <main id="main-root"></main>
    <div id="footer-root"></div>

    <!-- JS modules (order matters) -->
    <script src="js/loader.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/cursor.js"></script>
    <script src="js/effects.js"></script>   <!-- grid bg -->
    <script src="js/animations.js"></script> <!-- scroll animations -->
    <script src="js/main.js"></script>
  </body>
</html>
