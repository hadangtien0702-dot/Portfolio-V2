<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio V2 | Modern Design</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="description" content="My Personal Portfolio - A modern and sophisticated website design." />
  </head>
  <body>
    <!-- Custom cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- Back to top -->
    <button id="back-to-top" aria-label="Back to top">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <div id="header-root"></div>
    <main id="main-root"></main>
    <div id="footer-root"></div>

    <script>
      async function loadComponent(id, path) {
        try {
          const res = await fetch(path);
          const html = await res.text();
          document.getElementById(id).insertAdjacentHTML('beforeend', html);
        } catch (e) {
          console.error(`Error loading ${path}:`, e);
        }
      }

      async function init() {
        await loadComponent('header-root', 'components/header.html');

        // Load sections in strict order: 1 → 2 → 3 → 4 → 5
        await loadComponent('main-root', 'components/hero.html');
        await loadComponent('main-root', 'components/case-study.html');
        await loadComponent('main-root', 'components/growth-timeline.html');
        await loadComponent('main-root', 'components/video-system.html');
        await loadComponent('main-root', 'components/creative-works.html');

        await loadComponent('footer-root', 'components/footer.html');

        // Smooth scroll for nav links
        document.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', e => {
            e.preventDefault();
            const target = document.querySelector(link.getAttribute('href'));
            if (target) target.scrollIntoView({ behavior: 'smooth' });
          });
        });

        // Active nav highlight on scroll
        const sections = document.querySelectorAll('section[id]');
        const navLinks = document.querySelectorAll('.nav-link');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              navLinks.forEach(link => link.classList.remove('active'));
              const active = document.querySelector(`.nav-link[href="#${entry.target.id}"]`);
              if (active) active.classList.add('active');
            }
          });
        }, { threshold: 0.4 });
        sections.forEach(s => observer.observe(s));

        // ── Sticky header ──
        const header = document.querySelector('header');

        // ── Custom cursor ──
        const cursorDot = document.getElementById('cursor-dot');
        let cursorX = 0, cursorY = 0;
        let scrollTimer = null;

        document.addEventListener('mousemove', e => {
          cursorX = e.clientX;
          cursorY = e.clientY;
          cursorDot.style.left = cursorX + 'px';
          cursorDot.style.top  = cursorY + 'px';
        });

        document.addEventListener('mousedown', () => cursorDot.classList.add('clicking'));
        document.addEventListener('mouseup',   () => cursorDot.classList.remove('clicking'));

        // ── Back to Top ──
        const backBtn = document.getElementById('back-to-top');
        const section2 = document.getElementById('case-study');

        backBtn.addEventListener('click', () => {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ── Single scroll listener (all features) ──
        window.addEventListener('scroll', () => {
          const scrollY = window.scrollY;

          // Sticky header
          if (header) header.classList.toggle('scrolled', scrollY > 30);

          // Custom cursor: show when scrolling, hide when stopped
          cursorDot.classList.add('visible');
          document.body.classList.add('is-scrolling');
          clearTimeout(scrollTimer);
          scrollTimer = setTimeout(() => {
            cursorDot.classList.remove('visible');
            document.body.classList.remove('is-scrolling');
          }, 800);

          // Back to top: show when reaching section 2
          if (section2) {
            const show = scrollY >= section2.offsetTop - 200;
            backBtn.classList.toggle('visible', show);
          }
        });
      }

      window.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
</html>
