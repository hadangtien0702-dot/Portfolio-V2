<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio V2 | Modern Design</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="description" content="My Personal Portfolio - A modern and sophisticated website design." />
  </head>
  <body>
    <!-- Custom cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>

    <!-- Back to top -->
    <button id="back-to-top" aria-label="Back to top">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <div id="header-root"></div>
    <main id="main-root"></main>
    <div id="footer-root"></div>

    <!-- JS modules (order matters: each file depends on the one above it) -->
    <script src="js/loader.js"></script>   <!-- loadAllComponents() -->
    <script src="js/nav.js"></script>       <!-- initNav() -->
    <script src="js/cursor.js"></script>    <!-- initCursor(), initBackToTop(), initScrollEffects() -->
    <script src="js/main.js"></script>      <!-- entry point: calls all of the above -->
  </body>
</html>
