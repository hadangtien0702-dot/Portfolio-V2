<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio V2 | Modern Design</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="description" content="My Personal Portfolio - A modern and sophisticated website design." />
  </head>
  <body>
    <div id="header-root"></div>
    <main id="main-root"></main>
    <div id="footer-root"></div>

    <script>
      async function loadComponent(id, path) {
        try {
          const response = await fetch(path);
          const data = await response.text();
          document.getElementById(id).innerHTML = data;
        } catch (error) {
          console.error(`Error loading ${path}:`, error);
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadComponent('header-root', 'components/header.html');
        loadComponent('main-root', 'components/hero.html');
        loadComponent('footer-root', 'components/footer.html');
      });
    </script>
  </body>
</html>
